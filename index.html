<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Be My Valentine 💖</title>
<style>
    body {
        height: 150vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ffd6e8;
        font-family: Arial, sans-serif;

    background-image:url("beautiful-rose-nature.jpg");
    background-size:cover;
    background-position:center;
}
    .card {
        background: #fff;
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        width: 450px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    h1 { margin-bottom: 30px; }
    button {
        padding: 12px 25px;
        font-size: 18px;
        border-radius: 25px;
        border: none;
        cursor: pointer;
        margin: 10px;
        transition: 0.2s;
    }
    #yes { background: #ff4d6d; color: white; }
    #no { background: #ddd; position: absolute; }
</style>
</head>
<body>

<!-- iframe starts EMPTY, src added only on Yes click -->
<iframe id="bgMusic"
  width="0" height="0"
  src=""
  allow="autoplay; encrypted-media"
  frameborder="0">
</iframe>

<div class="card" id="card">

    
    <h1>✨ My Dear Shivangi, will you be my Soul Mate? 💕</h1>

     <img src="1000203431.jpg"
         alt="Memory"
         width="280"
         style="border-radius:15px; margin-bottom:20px;">

    <button id="yes">Yes 💖</button>
    <button id="no">No 😅</button>
</div>

<script>
    const noBtn = document.getElementById("no");
    const yesBtn = document.getElementById("yes");

    noBtn.addEventListener("mouseover", () => {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });

    yesBtn.addEventListener("click", () => {

        // ✅ Song starts ONLY after user clicks Yes
        document.getElementById("bgMusic").src = 
        "https://www.youtube.com/embed/uVV1B2lTchM?autoplay=1&loop=1&playlist=uVV1B2lTchM";

        document.getElementById("card").innerHTML = `

            <img src="1000203431.jpg"
         width="280"
         style="
             border-radius:20px;
             margin-bottom:20px;
             box-shadow:0 10px 25px rgba(0,0,0,.3);
         ">


            <h1 style="font-size:20px; color:#ff4d6d;">
                YAYYY!!! 🎉<br>
                My dear Shivangi ❤️<br>
                Thanks for accepting my proposal 💖<br>
                🥰<br>
                कुछ शब्द मेरे दिल से खास तुम्हारे लिए 💕<br><br>
                हर उस हवा को क़ैद कर लूँ, जिसने तुझे छुआ,<br>
                हर उस बूँद को क़ैद कर लूँ, जिसने तेरे बदन को भिगोया।<br>
                हर उस रोशनी को क़ैद कर लूँ, जिसने तुझे निखारा,<br>
                हर उन आँखों को क़ैद कर लूँ, जिन्होंने तुझे देखा।<br>
                कैद कर लूं मैं तुझको खुद में,<br>
                और मैं कैद हो जाऊँ तुझमें ❤️<br><br>
            </h1>
        `;
    });
</script>
</body>
</html>
